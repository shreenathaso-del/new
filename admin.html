<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>🔐 Admin Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div class="box" id="panel" style="display:none;">
<h2>⚙ Admin Panel</h2>

<input type="text" id="formLink" placeholder="Google Form Link">
<input type="text" id="sheetID" placeholder="Google Sheet ID">

<button onclick="saveData()">Save</button>
</div>

<script>

const PASSWORD = "1234"; // change password

function login(){
    let p = document.getElementById("pass").value;
    if(p === PASSWORD){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="block";
    }else{
        alert("Wrong Password");
    }
}

function saveData(){
    localStorage.setItem("formLink", document.getElementById("formLink").value);
    localStorage.setItem("sheetID", document.getElementById("sheetID").value);
    alert("Saved Successfully!");
}

</script>

</body>
</html>
