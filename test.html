<!DOCTYPE html>
<html>
<head>
<title>Online Test - COPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
    text-align: center;
}

header {
    background: #2c3e50;
    color: white;
    padding: 20px;
}

.container {
    margin: 30px;
}

.test-box {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
    padding: 12px 20px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #219150;
}

.home-btn {
    display: inline-block;
    margin: 10px;
    padding: 10px 15px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
<h1>📝 COPA Online Test</h1>
<p>Practice & Assessment Portal</p>
<a href="index.html" class="home-btn">🏠 Home</a>
</header>

<div class="container">

<div class="test-box">
<h2>Monthly Test</h2>
<p>All Topics</p>
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc5UkYOkbOLNf2klQbs7A8xj9m7uwR62QATbEYQ8j677_3H0Q/viewform?usp=dialog" target="_blank">
<button>Start Test</button>
</a>
</div>




</div>

<h2>📝 Online Test</h2>

<a id="testBtn" target="_blank">
<button>Start Test</button>
</a>

<br><br>

<button onclick="loadResult()">View Result</button>

<table border="1" id="resultTable">
<tr>
<th>Score</th>
<th>Name</th>
</tr>
</table>

<script>

// Test link auto
let formLink = localStorage.getItem("formLink");
if(formLink){
    document.getElementById("testBtn").href = formLink;
}

// Result load
function loadResult(){
    let sheetID = localStorage.getItem("sheetID");

    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=Form Responses 1`;

    fetch(url)
    .then(res => res.text())
    .then(data => {
        const jsonData = JSON.parse(data.substring(47).slice(0, -2));
        const rows = jsonData.table.rows;

        let table = document.getElementById("resultTable");

        rows.forEach(row => {
            let score = row.c[1]?.v;
            let name = row.c[2]?.v;

            if(score && name){
                let tr = document.createElement("tr");
                tr.innerHTML = `<td>${score}</td><td>${name}</td>`;
                table.appendChild(tr);
            }
        });
    });
}

</script>

</body>
</html>
