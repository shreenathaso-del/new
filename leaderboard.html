<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
}

table{
    width:90%;
    margin:20px auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:12px;
    text-align:center;
}

th{
    background:#34495e;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}
</style>
</head>

<body>

<header>
<h2>🏆 Live Leaderboard</h2>
</header>

<table id="leaderboard">
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
</table>

<script>

// 👉 बस यह बदलना है
var sheetID = "1HnWEW3rFDynr3jGM0WjvmTuoTfzDbppQeghkGMmb5FU";

var url = "https://docs.google.com/spreadsheets/d/" + sheetID + "/gviz/tq?tqx=out:csv";

fetch(url)
.then(function(res){ return res.text(); })
.then(function(csv){

    var rows = csv.split("\n").slice(1);
    var students = [];

    rows.forEach(function(row){
        if(row.trim() !== ""){

            var cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

            var scoreRaw = cols[1];
            var name = cols[2];

            if(scoreRaw && name){

                scoreRaw = scoreRaw.replace(/"/g,'').trim();
                name = name.replace(/"/g,'').trim();

                var num = scoreRaw.match(/\d+/);

                if(num){
                    students.push({
                        name: name,
                        score: parseInt(num[0])
                    });
                }
            }
        }
    });

    // 🔥 sorting (highest first)
    students.sort(function(a,b){
        return b.score - a.score;
    });

    var table = document.getElementById("leaderboard");

    students.forEach(function(s,i){

        var tr = document.createElement("tr");

        tr.innerHTML =
        "<td>"+(i+1)+"</td>"+
        "<td>"+s.name+"</td>"+
        "<td>"+s.score+"</td>";

        table.appendChild(tr);
    });

})
.catch(function(err){
    console.log(err);
    alert("Data load nahi ho raha");
});

</script>

</body>
</html>
